<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel AI</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">

      <header>
        <div class="top-row">
          <button id="play">play</button>
          <button id="stop">stop</button>
          <button id="eval">eval</button>
          <select id="examples"><option value="">examples</option></select>
          <button id="clear">clear</button>

          <div class="sep"></div>

          <button id="hist-back" disabled title="Undo (Cmd+Z)">←</button>
          <button id="hist-fwd"  disabled title="Redo">→</button>

          <div class="sep"></div>

          <input id="bpm" type="range" min="60" max="200" value="120" step="1" disabled />
          <span id="bpm-label">— bpm</span>
          <button id="tap-tempo">tap</button>

          <div class="spacer"></div>

          <button id="save-patch">save</button>
          <button id="open-patch">open</button>
          <button id="record">rec</button>

          <input id="apikey" type="password" placeholder="openai key" />
        </div>

        <div id="slots-row">
          <button class="slot active" data-slot="0">1</button>
          <button class="slot" data-slot="1">2</button>
          <button class="slot" data-slot="2">3</button>
          <button class="slot" data-slot="3">4</button>
          <button class="slot" data-slot="4">5</button>
          <button class="slot" data-slot="5">6</button>
          <button class="slot" data-slot="6">7</button>
          <button class="slot" data-slot="7">8</button>
        </div>
      </header>

      <main>
        <div id="editor-pane">
          <div id="editor"></div>
          <canvas id="visualizer"></canvas>
        </div>

        <aside id="chat-pane">
          <div id="chat-header">
            <span class="chat-label">chat</span>
            <div class="chat-header-actions">
              <button id="explain">explain</button>
              <button id="clear-chat">clear</button>
            </div>
          </div>

          <div id="templates">
            <button class="tpl" data-tpl="make it darker and more hypnotic">darker</button>
            <button class="tpl" data-tpl="add more acid 303 resonance on the bass">acid</button>
            <button class="tpl" data-tpl="remove the kick drum">no kick</button>
            <button class="tpl" data-tpl="add swing and groove to the pattern">swing</button>
            <button class="tpl" data-tpl="add more reverb and spatial depth">reverb</button>
            <button class="tpl" data-tpl="make the hi hats faster and more panned">hats</button>
          </div>

          <div id="messages"></div>

          <div id="chat-input">
            <textarea id="prompt" rows="2"
              placeholder="agrega un bajo rodante en c…"></textarea>
            <div class="send-row">
              <button id="generate">add</button>
              <button id="variations-btn">vars</button>
            </div>
          </div>
        </aside>
      </main>

      <footer>
        <span id="status">loading…</span>
        <span id="status-slot"></span>
      </footer>

    </div>
  </body>
</html>
