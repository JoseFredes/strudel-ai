<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loopcraft</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">

      <header>
        <div class="top-row">
          <button id="play">play</button>
          <button id="stop">stop</button>
          <button id="eval">eval</button>
          <select id="examples"><option value="">examples</option></select>
          <button id="clear">clear</button>

          <div class="sep"></div>

          <button id="hist-back" disabled title="Undo (Cmd+Z)">←</button>
          <button id="hist-fwd"  disabled title="Redo">→</button>

          <div class="sep"></div>

          <input id="bpm" type="range" min="60" max="200" value="120" step="1" disabled />
          <span id="bpm-label">— bpm</span>
          <button id="tap-tempo">tap</button>

          <div class="spacer"></div>

          <button id="save-patch">save</button>
          <button id="open-patch">open</button>
          <button id="record">rec</button>
          <button id="key-btn" title="API Key">key</button>
        </div>

        <div id="slots-row">
          <button class="slot active" data-slot="0">1</button>
          <button class="slot" data-slot="1">2</button>
          <button class="slot" data-slot="2">3</button>
          <button class="slot" data-slot="3">4</button>
          <button class="slot" data-slot="4">5</button>
          <button class="slot" data-slot="5">6</button>
          <button class="slot" data-slot="6">7</button>
          <button class="slot" data-slot="7">8</button>
        </div>
      </header>

      <main>
        <div id="editor-pane">
          <div id="editor"></div>
          <canvas id="visualizer"></canvas>
        </div>

        <aside id="chat-pane">
          <div id="chat-header">
            <span class="chat-label">chat</span>
            <div class="chat-header-actions">
              <button id="suggest-btn">suggest</button>
              <button id="explain">explain</button>
              <button id="clear-chat">clear</button>
            </div>
          </div>

          <div id="templates">
            <button class="tpl" data-tpl="rewrite as classic house music: four-on-the-floor kick, offbeat open hats, clap on 2 and 4, warm chord stab around 125 bpm">house</button>
            <button class="tpl" data-tpl="add African house elements: tribal congas, shakers, polyrhythmic hi-hat patterns, warm sub-bass groove">afro</button>
            <button class="tpl" data-tpl="strip to minimal techno: keep only kick and one hypnotic repeating element, extreme repetition, remove all excess complexity">minimal</button>
            <button class="tpl" data-tpl="make it deep house: warm pad chords, jazzy bass line, slow swinging groove, soulful feel around 120 bpm">deep</button>
            <button class="tpl" data-tpl="add dub techno character: long cavernous room reverb, ping-pong delay, dark resonant chords, sparse and meditative">dub</button>
            <button class="tpl" data-tpl="add a melodic lead line in the same key with slow filter sweep, long reverb tail, and emotional phrasing">melodic</button>
            <button class="tpl" data-tpl="dark Berlin techno style: cold mechanical hypnotic kick, sparse percussion, industrial and relentless">berlin</button>
            <button class="tpl" data-tpl="make it harder and industrial: distorted kick transients, metallic clanging percussion, aggressive saturated textures">industrial</button>
            <button class="tpl" data-tpl="make it darker and more hypnotic">darker</button>
            <button class="tpl" data-tpl="add more acid 303 resonance on the bass">acid</button>
            <button class="tpl" data-tpl="remove the kick drum">no kick</button>
            <button class="tpl" data-tpl="add swing and groove to the pattern">swing</button>
            <button class="tpl" data-tpl="add more reverb and spatial depth">reverb</button>
            <button class="tpl" data-tpl="make the hi hats faster and more panned">hats</button>
            <button class="tpl" data-tpl="increase tempo to around 145 bpm and make the pattern more driving and urgent">faster</button>
            <button class="tpl" data-tpl="slow down to around 110 bpm, add more space between hits, more meditative feeling">slower</button>
            <button class="tpl" data-tpl="make the bass heavier: add sub-bass layer, boost low end, make it more physical and powerful">bass</button>
            <button class="tpl" data-tpl="add one new complementary textural layer without cluttering existing sounds">layer</button>
          </div>

          <div id="messages"></div>

          <div id="chat-input">
            <textarea id="prompt" rows="2"
              placeholder="agrega un bajo rodante en c…"></textarea>
            <div class="send-row">
              <button id="generate">add</button>
              <button id="variations-btn">vars</button>
            </div>
          </div>
        </aside>
      </main>

      <footer>
        <span id="status">loading…</span>
        <span id="status-slot"></span>
      </footer>

    </div>
    <!-- API Key modal -->
    <div id="key-modal" class="modal-backdrop" hidden>
      <div class="modal">
        <div class="modal-title">OpenAI API Key</div>
        <p class="modal-desc">Your key is stored locally and never sent to any server other than OpenAI.</p>
        <input id="modal-apikey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
        <div class="modal-actions">
          <button id="modal-skip" class="modal-btn-secondary">skip</button>
          <button id="modal-save" class="modal-btn-primary">save</button>
        </div>
      </div>
    </div>
  </body>
</html>
